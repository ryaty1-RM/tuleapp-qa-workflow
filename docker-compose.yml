services:
  tuleap:
    image: tuleap/tuleap-community-edition
    hostname: tuleap
    restart: always
    environment:
      - TULEAP_FQDN=localhost
      - TULEAP_SYS_DBHOST=db
      - TULEAP_SYS_DBPASSWD=tuleap_pass
      - DB_ADMIN_USER=root
      - DB_ADMIN_PASSWORD=tuleap_root
      - SITE_ADMINISTRATOR_PASSWORD=Admin1234!
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - tuleap-data:/data
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    restart: always
    command: >
      --sql-mode=""
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: tuleap_root
      MYSQL_DATABASE: tuleap
      MYSQL_USER: tuleap
      MYSQL_PASSWORD: tuleap_pass
    volumes:
      - db-data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always

volumes:
  tuleap-data:
  db-data: